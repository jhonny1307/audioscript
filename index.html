<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Script</title>

<style>
body {
    font-family: Arial;
    background:#010101;
    color:#eee;
    padding:15px;
    max-width:900px;
    margin:auto;
}

h2 {
    display:flex;
    align-items:flex-end;
    gap:8px;
}

h2 span {
    font-size:50%;
    opacity:0.7;
}

textarea, input {
    width:100%;
    margin-bottom:10px;
    font-size:14px;
    background:#111;
    color:#eee;
    border:1px solid #333;
    border-radius:6px;
    padding:8px;
}

button {
    margin:4px 4px 4px 0;
    padding:6px 10px;
    font-size:13px;
    background:#111;
    color:#eee;
    border:1px solid #333;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    background:#222;
}

.part {
    border:1px solid #333;
    padding:10px;
    margin:15px 0;
    border-radius:8px;
    background:#0a0a0a;
}

.controls {
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
}

audio {
    width:100%;
    margin-top:10px;
}

.comment {
    border:1px dashed #444;
    padding:12px;
    margin:25px 0;
    color:#aaa;
    font-style:italic;
    border-radius:8px;
}

.topbar {
    margin-bottom:15px;
}

/* highlight // */
.highlight-comment {
    font-weight:bold;
}
</style>
</head>
<body>

<h2>🎤AudioScript <span>web</span></h2>

<textarea id="script" rows="6" placeholder="Cole seu roteiro aqui ou começe a criar agora...
crie comentarios usando '//' antes do comentario"></textarea>

<div class="topbar">
    <button onclick="splitScript()" title="Divide o roteiro em faixas">Split</button>
    <button onclick="clearProject()" title="Apaga tudo salvo">Clear</button>
</div>

<h3>Gap between tracks (ms)</h3>
<input type="number" id="gap" value="0">

<div id="parts"></div>

<button onclick="generateAudio(false)" title="Gera áudio apenas dos favoritos">Generate final audio</button>
<button onclick="generateAudio(true)" title="Gera áudio com tudo">Generate final audio (with all)</button>

<hr style="border:0; border-top:1px solid #222; margin-top:40px;">

<footer style="margin-top:20px; font-size:14px; color:#777; text-align:center;">
    made with AI (chatGPT),
    <a href="https://github.com/jhonny1307/audioscript-web" target="_blank" style="color:#aaa;">
        project file (v10)
    </a>
</footer>

<script>
let parts = [];
let chunks = {};
let toggles = {};
let mediaRecorder;
let currentStream;
let state = {};
let tempData = {};

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(30);
    }
}

document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click", vibrate);
});

document.getElementById("script").addEventListener("input", ()=>{
    const lines = document.getElementById("script").value.split("\n");
    const formatted = lines.map(l=>{
        if(l.trim().startsWith("//")){
            return "<b>" + l + "</b>";
        }
        return l;
    }).join("\n");
});

function autoSave(){
    const roteiro = document.getElementById("script").value;

    let audios = {};
    Promise.all(Object.keys(chunks).map(async i => {
        audios[i] = await blobToBase64(chunks[i]);
    })).then(()=>{
        const data = { roteiro, audios, toggles };
        localStorage.setItem("audioRoteiro", JSON.stringify(data));
    });
}

function toggleLike(i){
    toggles[i] = toggles[i] ? 0 : 1;
    document.getElementById(`like_${i}`).innerText = toggles[i] ? "🔴" : "⚫";
    autoSave();
}

function splitScript() {
    const text = document.getElementById("script").value;
    parts = text.split("\n").filter(p => p.trim() !== "");
    const container = document.getElementById("parts");
    container.innerHTML = "";
    chunks = {};
    state = {};

    parts.forEach((p, i) => {
        const trimmed = p.trim();

        if(trimmed.startsWith("//")){
            const div = document.createElement("div");
            div.className = "comment";
            div.innerHTML = "<b>" + trimmed.replace("//","") + "</b>";
            container.appendChild(div);
            return;
        }

        if(toggles[i] === undefined) toggles[i] = 0;
        state[i] = "idle";

        const div = document.createElement("div");
        div.className = "part";
        div.innerHTML = `
            <p>${p}</p>

            <audio controls id="audio_${i}"></audio>

            <div class="controls">
                <button title="Marcar como favorito" id="like_${i}" onclick="toggleLike(${i})">${toggles[i] ? "🔴" : "⚫"}</button>
                <button title="Gravar áudio" id="btn_${i}" onclick="toggleRecording(${i})">Record</button>
                <button title="Interromper gravação" id="interrupt_${i}" onclick="interruptRecording(${i})" style="display:none;">Interrupt</button>
                <button title="Enviar arquivo de áudio" id="upload_${i}" onclick="uploadAudio(${i})">Upload</button>
                <input type="file" id="file_${i}" accept="audio/*" style="display:none;">
            </div>
        `;
        container.appendChild(div);

        document.getElementById(`file_${i}`).addEventListener("change", (e)=>{
            const file = e.target.files[0];
            if(!file) return;

            const blob = new Blob([file], { type:file.type });
            chunks[i] = blob;
            document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);

            state[i] = "recorded";
            document.getElementById(`btn_${i}`).innerText = "Re-record";

            autoSave();
        });
    });

    autoSave();
}

function uploadAudio(i){
    document.getElementById(`file_${i}`).click();
}

async function toggleRecording(i){
    const btn = document.getElementById(`btn_${i}`);
    const interruptBtn = document.getElementById(`interrupt_${i}`);
    const uploadBtn = document.getElementById(`upload_${i}`);

    if(state[i] === "idle" || state[i] === "recorded"){
        currentStream = await navigator.mediaDevices.getUserMedia({ audio:true });
        mediaRecorder = new MediaRecorder(currentStream);

        tempData[i] = [];

        mediaRecorder.ondataavailable = e => tempData[i].push(e.data);

        mediaRecorder.onstop = () => {
            if(tempData[i].length){
                const blob = new Blob(tempData[i], { type:"audio/webm" });
                chunks[i] = blob;
                document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);
            }

            currentStream.getTracks().forEach(t => t.stop());

            state[i] = "recorded";
            btn.innerText = "Re-record";
            interruptBtn.style.display = "none";
            uploadBtn.style.display = "inline-block";

            autoSave();
        };

        mediaRecorder.start();
        state[i] = "recording";
        btn.innerText = "Stop";
        interruptBtn.style.display = "inline-block";
        uploadBtn.style.display = "none";
    }
    else if(state[i] === "recording"){
        mediaRecorder.stop();
        btn.innerText = "Processing...";
        interruptBtn.style.display = "none";
    }
}

function interruptRecording(i){
    if(mediaRecorder && state[i] === "recording"){
        mediaRecorder.onstop = null;
        mediaRecorder.stop();

        if(currentStream){
            currentStream.getTracks().forEach(t => t.stop());
        }

        tempData[i] = [];

        const btn = document.getElementById(`btn_${i}`);
        const interruptBtn = document.getElementById(`interrupt_${i}`);
        const uploadBtn = document.getElementById(`upload_${i}`);

        state[i] = chunks[i] ? "recorded" : "idle";
        btn.innerText = chunks[i] ? "Re-record" : "Record";
        interruptBtn.style.display = "none";
        uploadBtn.style.display = "inline-block";
    }
}

function clearProject(){
    localStorage.removeItem("audioRoteiro");
    location.reload();
}

window.onload = function(){
    const data = JSON.parse(localStorage.getItem("audioRoteiro"));
    if(!data) return;

    document.getElementById("script").value = data.roteiro;
    toggles = data.toggles || {};

    splitScript();

    for (let i in data.audios){
        const blob = base64ToBlob(data.audios[i]);
        chunks[i] = blob;
        document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);
        state[i] = "recorded";
        document.getElementById(`btn_${i}`).innerText = "Re-record";
    }
};

async function generateAudio(useAll){
    const gap = parseInt(document.getElementById("gap").value) || 0;
    const ctx = new AudioContext();
    let buffers = [];

    for(let i=0;i<parts.length;i++){
        if(!chunks[i]) continue;
        if(!useAll && !toggles[i]) continue;

        try {
            const buffer = await ctx.decodeAudioData(await chunks[i].arrayBuffer());
            buffers.push(buffer);
        } catch(e){}
    }

    if(!buffers.length){
        alert("No audio selected");
        return;
    }

    let totalLength = buffers.reduce((a,b)=>a+b.length,0) + (gap/1000 * ctx.sampleRate * buffers.length);
    let output = ctx.createBuffer(1, totalLength, ctx.sampleRate);

    let offset = 0;
    buffers.forEach(b=>{
        output.getChannelData(0).set(b.getChannelData(0), offset);
        offset += b.length + (gap/1000 * ctx.sampleRate);
    });

    const wav = bufferToWav(output);
    const blob = new Blob([wav], { type:"audio/wav" });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "final.wav";
    a.click();
    URL.revokeObjectURL(url);
}

function blobToBase64(blob){/* ... */}
function base64ToBlob(base64){/* ... */}
</script>

</body>
</html>
